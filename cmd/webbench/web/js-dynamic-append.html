<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JS Dynamic Append</title>
</head>

<body>
  <button id="expand">expand</button>
  <button id="clear">clear</button>

  <ul id="target">
  </ul>

  <script>
    const target = document.getElementById("target")
    const expand = document.getElementById("expand")
    const clear = document.getElementById("clear")

    const list = (...children) => {
      const l = document.createElement("ul")
      l.append(...children)
      return l
    }
    const opt = (name) => {
      const item = document.createElement("li")
      item.innerText = name
      return item
    }

    let index = 0
    expand.onclick = () => {
      const ul = list(
        opt(`entry ${index++}`),
      )
      target.append(
        opt(`entry ${index++}`),
        ul,
        opt(`entry ${index++}`),
      )
      // DOM changes are batched by the closure (this is browser behavior is
      // expected)!
      //
      // thus, the following setTimeout should constitute a completely separate
      // update event even though it happens just 10 ms later.
      setTimeout(() => {
        target.append(opt(`late added ${index++}`))
      }, 10)
    }
    clear.onclick = () => {
      target.replaceChildren()
      index = 0
      containerOuter.replaceChildren(containerOuter.children.slice(0, 1))
      containerInner.replaceChildren()
    }
  </script>
</body>
</html>
